<!doctype html>
<html lang="en" data-theme="cozy-typepad" data-layout="main">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="{{asset-url assets/cozy-typepad.css}}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="container">
    <header class="site-header" role="banner">
      <p class="site-title"><a href="index.html">Boris Dogfood</a></p>
      {{breadcrumb}}
    </header>
    <div class="layout-wrapper">
      <main id="main-content" class="site-main" tabindex="-1">
        {{metadata}}
        {{toc}}
        <article class="entry">
          <div class="entry-content prose">
            {{content}}
          </div>
        </article>
        {{children}}
      </main>
      <aside class="site-sidebar" aria-label="Sidebar">
        <div class="sidebar-module">
          <h3>Browse</h3>
          {{nav}}
        </div>
      </aside>
    </div>
    <footer class="site-footer theme-footer" role="contentinfo">
      {{footer}}
    </footer>
  </div>
</body>
</html>
