name: Validate Boris Content Graph & Themes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Run Content Graph Validation
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions
        run: |
          chmod +x bin/boris
          chmod +x bin/validate_graph.sh

      - name: Validate graph & compile themes
        run: ./bin/validate_graph.sh

      - name: Upload Corp-Vendor build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-corp
          path: dist/corp/
          retention-days: 7

      - name: Upload Google Material build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-material
          path: dist/material/
          retention-days: 7

      - name: Upload Cozy-Typepad build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-cozy
          path: dist/cozy/
          retention-days: 7
